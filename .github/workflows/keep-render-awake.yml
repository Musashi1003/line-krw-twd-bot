name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            https://line-krw-twd-bot.onrender.com/health
